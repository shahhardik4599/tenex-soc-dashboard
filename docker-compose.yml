version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tenex_postgres
    restart: always
    environment:
      POSTGRES_USER: tenex_user
      POSTGRES_PASSWORD: tenex_password
      POSTGRES_DB: tenex_soc_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: