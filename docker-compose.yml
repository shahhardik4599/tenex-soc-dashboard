version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tenex_postgres
    restart: always
    environment:
      POSTGRES_USER: tenex_user
      POSTGRES_PASSWORD: tenex_password
      POSTGRES_DB: tenex_soc_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: tenex_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env   # Tells Docker to pull your GROQ_API_KEY from here
    environment:
      # This overrides the "localhost" fallback in your database.py
      - DATABASE_URL=postgresql://tenex_user:tenex_password@db:5432/tenex_soc_db
    depends_on:
      - db
    volumes:
      # Maps your root /data folder into the backend container so detection.py can find stix_intel_feed.json
      - ./data:/app/data

  frontend:
    build: ./frontend
    container_name: tenex_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
